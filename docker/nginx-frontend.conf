# ============================================================
# BookVerse 用户端前端 Nginx 配置
# 功能：
#   1. 托管 Vue SPA 静态文件
#   2. 将 /api 请求代理到 API 网关
#   3. SPA 路由 fallback（所有非文件请求指向 index.html）
# ============================================================

server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # 允许上传文件最大 20MB（如头像上传）
    client_max_body_size 20M;

    # Gzip 压缩（减少传输体积）
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # 静态资源缓存（Vite 构建的文件名包含 hash，可长期缓存）
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # API 请求代理到网关
    location /api/ {
        proxy_pass http://gateway:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        # WebSocket 支持（如消息推送）
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # SPA fallback：所有未匹配的路由都指向 index.html，由 Vue Router 处理
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 健康检查端点（供 Docker 健康检查或负载均衡器使用）
    location /health {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }
}
