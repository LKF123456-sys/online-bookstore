# ============================================================
# BookVerse K8s — 后端微服务 Deployment & Service
# 包含 8 个独立微服务：gateway, user, product, order, promotion, message, admin, agent
# ============================================================

# ==================== 公共环境变量模板（通过 anchor 复用） ====================
# 注意：K8s YAML 不支持 anchor，以下每个服务独立定义环境变量

# ============================================================
# 1. Gateway — API 网关 (:8080)
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bookstore-gateway
  namespace: bookverse
  labels:
    app: bookstore-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bookstore-gateway
  template:
    metadata:
      labels:
        app: bookstore-gateway
    spec:
      containers:
        - name: bookstore-gateway
          image: bookverse/bookstore-gateway:latest
          ports:
            - containerPort: 8080
          env:
            - name: SERVER_PORT
              value: "8080"
            - name: SPRING_PROFILES_ACTIVE
              valueFrom:
                configMapKeyRef:
                  name: bookverse-config
                  key: SPRING_PROFILES_ACTIVE
            - name: NACOS_SERVER_ADDR
              valueFrom:
                configMapKeyRef:
                  name: bookverse-config
                  key: NACOS_SERVER_ADDR
            - name: REDIS_HOST
              value: "redis-service"
            - name: REDIS_PORT
              value: "6379"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: bookverse-secret
                  key: JWT_SECRET
            - name: JAVA_OPTS
              value: "-javaagent:/skywalking/agent/skywalking-agent.jar -Xms256m -Xmx512m -XX:+UseG1GC"
            - name: SW_AGENT_NAME
              value: "bookstore-gateway"
            - name: SW_AGENT_COLLECTOR_BACKEND_SERVICES
              value: "skywalking-oap:11800"
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: bookstore-gateway
  namespace: bookverse
spec:
  selector:
    app: bookstore-gateway
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP

---
