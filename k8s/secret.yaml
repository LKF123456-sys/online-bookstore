# ============================================================
# BookVerse K8s 配置 — Secret（敏感配置）
# 部署前请替换 data 中的 base64 值：
#   echo -n 'your-value' | base64
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: bookverse-secret
  namespace: bookverse
type: Opaque
data:
  # 默认值: root / root（仅供开发环境，生产环境必须替换）
  DB_USERNAME: cm9vdA==          # echo -n 'root' | base64
  DB_PASSWORD: cm9vdA==          # echo -n 'root' | base64
  REDIS_PASSWORD: ""             # echo -n '' | base64
  # JWT 密钥 — 生产环境必须替换为安全密钥（至少 256 位）
  # echo -n 'BookVerseSecretKey2024ForJWTTokenGenerationMustBe256BitsLongEnough' | base64
  JWT_SECRET: Qm9va1ZlcnNlU2VjcmV0S2V5MjAyNEZvckpXVFRva2VuR2VuZXJhdGlvbk11c3RCZTI1NlRpdHNMb25nRW5vdWdo
