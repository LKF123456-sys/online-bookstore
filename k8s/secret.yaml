# ============================================================
# BookVerse K8s 配置 — Secret（敏感配置）
# ============================================================
#
# WARNING — 部署前必须完成以下步骤：
#   1. 将所有 base64 值替换为真实的生产密钥：
#        echo -n 'your-real-value' | base64
#   2. JWT_SECRET 必须至少 256 位（32 字节），推荐更长。
#   3. 绝对不要将包含真实密钥的本文件提交到版本控制系统。
#   4. 生产环境建议使用 Sealed Secrets 或外部密钥管理服务
#      （如 HashiCorp Vault、AWS Secrets Manager）替代本文件。
#
# 默认值仅适用于本地开发，严禁用于生产环境。
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: bookverse-secret
  namespace: bookverse
type: Opaque
data:
  # -----------------------------------------------------------
  # DB_USERNAME / DB_PASSWORD
  # 默认值: root / root（仅供开发环境，生产环境必须替换）
  # -----------------------------------------------------------
  DB_USERNAME: cm9vdA==          # echo -n 'root' | base64
  DB_PASSWORD: cm9vdA==          # echo -n 'root' | base64
  REDIS_PASSWORD: ""             # echo -n '' | base64
  # -----------------------------------------------------------
  # JWT 密钥 — 生产环境必须替换为安全密钥（至少 256 位）
  # -----------------------------------------------------------
  # TODO: 生成新的 JWT 密钥并替换此值：
  #   openssl rand -base64 64
  #   或: echo -n 'your-secure-jwt-secret-at-least-256-bits' | base64
  # JWT_SECRET: <REPLACE_WITH_BASE64_ENCODED_JWT_SECRET>
