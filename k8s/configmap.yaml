# ============================================================
# BookVerse K8s 配置 — ConfigMap（非敏感配置）
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: bookverse-config
  namespace: bookverse
data:
  NACOS_SERVER_ADDR: "nacos-service:8848"
  NACOS_NAMESPACE: ""
  NACOS_GROUP: "DEFAULT_GROUP"
  SPRING_PROFILES_ACTIVE: "prod"
  DB_URL: "jdbc:mysql://mysql-service:3306/bookstore?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true"
