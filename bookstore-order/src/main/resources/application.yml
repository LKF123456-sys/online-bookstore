# ==================== 服务器配置 ====================
server:
  port: 8083  # 服务端口号，订单服务运行在8083端口

# ==================== Spring配置 ====================
spring:
  config:
    import: "optional:nacos:bookstore-order.yml"  # 从Nacos配置中心导入远程配置文件，optional表示即使Nacos不可用也不会报错
  application:
    name: bookstore-order  # 应用名称，用于在Nacos注册中心中标识该服务

  # ==================== 数据源配置（MySQL数据库） ====================
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/bookstore?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}  # 数据库连接地址，${DB_URL:...}表示优先读取环境变量DB_URL，如果不存在则使用默认值
    username: ${DB_USERNAME:bookstore_order}  # 数据库用户名，默认为订单服务专属账号（V5权限隔离）
    password: ${DB_PASSWORD:BookStore@Order2024}  # 数据库密码，默认为订单服务专属密码
    driver-class-name: com.mysql.cj.jdbc.Driver  # MySQL数据库驱动类名（MySQL 8.x版本的驱动）
    hikari:  # HikariCP数据库连接池配置（高性能连接池）
      maximum-pool-size: 20  # 连接池最大连接数
      minimum-idle: 5  # 连接池最小空闲连接数
      idle-timeout: 300000  # 空闲连接的最大存活时间（5分钟，单位毫秒）
      max-lifetime: 1200000  # 连接的最大生命周期（20分钟，单位毫秒）
      connection-timeout: 30000  # 获取连接的超时时间（30秒，单位毫秒）

  # ==================== Redis缓存配置 ====================
  data:
    redis:
      host: ${REDIS_HOST:localhost}  # Redis服务器地址，默认localhost
      port: ${REDIS_PORT:6379}  # Redis服务器端口，默认6379
      password: ${REDIS_PASSWORD:}  # Redis密码，默认为空
      database: 0  # 使用的Redis数据库编号（Redis默认有16个数据库，编号0-15）
      timeout: 3000ms  # Redis操作超时时间（3秒）
      lettuce:  # Lettuce是Spring Boot默认的Redis客户端
        pool:  # 连接池配置
          max-active: 8  # 连接池最大活跃连接数
          max-idle: 8  # 连接池最大空闲连接数
          min-idle: 0  # 连接池最小空闲连接数
          max-wait: -1ms  # 获取连接的最大等待时间，-1表示无限等待

  # ==================== RabbitMQ消息队列配置 ====================
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}  # RabbitMQ服务器地址
    port: ${RABBITMQ_PORT:5672}  # RabbitMQ服务器端口（5672是AMQP协议默认端口）
    username: ${RABBITMQ_USERNAME:guest}  # RabbitMQ用户名
    password: ${RABBITMQ_PASSWORD:guest}  # RabbitMQ密码
    virtual-host: /  # RabbitMQ虚拟主机，默认为/
    listener:  # 消息监听器配置
      simple:
        acknowledge-mode: manual  # 消息确认模式为手动确认（需要代码中手动ack/nack）
        prefetch: 10  # 每次从队列预取10条消息（控制消息消费速度）
        retry:  # 消费失败重试配置
          enabled: true  # 开启重试
          max-attempts: 3  # 最大重试次数为3次
          initial-interval: 1000  # 首次重试间隔时间（1秒）
    # RabbitMQ连接不自动失败，允许服务在RabbitMQ不可用时正常启动
    cache:
      channel:
        size: 0

  # ==================== Nacos服务注册与配置中心 ====================
  cloud:
    nacos:
      discovery:  # Nacos服务发现配置
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}  # Nacos服务器地址（8848是Nacos默认端口）
        namespace: ${NACOS_NAMESPACE:}  # Nacos命名空间（用于环境隔离，如dev/test/prod）
        group: ${NACOS_GROUP:DEFAULT_GROUP}  # Nacos分组（用于进一步分类服务）
      config:  # Nacos配置中心配置
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}  # Nacos配置中心地址
        namespace: ${NACOS_NAMESPACE:}  # 命名空间
        group: ${NACOS_GROUP:DEFAULT_GROUP}  # 分组
        file-extension: yml  # 远程配置文件的扩展名（对应Nacos中的配置文件格式）
        import-check:
          enabled: false  # 关闭导入检查（避免Nacos中没有配置文件时报错）

    # ==================== Feign客户端配置 ====================
    openfeign:
      circuitbreaker:
        enabled: true  # 启用 Feign 的熔断器支持（配合 Resilience4j 使用）
      client:
        config:
          default:  # 全局默认配置（所有 Feign 客户端共享，可被 Nacos 动态覆盖）
            connect-timeout: 5000  # TCP 连接超时：5秒，快速发现网络不可达
            read-timeout: 10000    # 读取响应超时：10秒，给下游足够处理时间
            logger-level: BASIC    # Feign 日志级别：BASIC 仅记录请求方法/URL/响应状态码

# ==================== MyBatis-Plus配置 ====================
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true  # 开启下划线转驼峰命名映射（如数据库字段user_id会映射为Java属性userId）
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl  # SQL日志输出到控制台（开发环境使用，生产环境建议关闭）
  global-config:
    db-config:
      id-type: auto  # 主键生成策略为自增（使用数据库的自增ID）
  mapper-locations: classpath:mapper/*.xml  # MyBatis XML映射文件的位置

# ==================== Actuator监控端点配置 ====================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus  # 暴露的Web端点：健康检查、应用信息、指标数据、Prometheus格式指标
  endpoint:
    health:
      show-details: when-authorized  # 健康检查详情仅在授权后显示

# ==================== 日志配置 ====================
logging:
  config: classpath:logback-spring.xml
  level:
    com.bookstore: ${LOG_LEVEL:INFO}  # 项目代码的日志级别，默认INFO（可通过环境变量调整）
    org.springframework: WARN

# ==================== JWT配置 ====================
jwt:
  secret: ${JWT_SECRET:bookstore-order-secret-key-2024-default}
  expiration: ${JWT_EXPIRATION:86400000}

# ==================== SpringDoc OpenAPI 配置 ====================
# 启用 API 文档生成功能，供 Swagger UI 加载展示
springdoc:
  api-docs:
    enabled: true  # 启用 /v3/api-docs 端点，生成 OpenAPI JSON 规范

# ==================== Resilience4j 熔断器配置 ====================
# 为 Feign 远程调用提供熔断保护，防止下游服务故障导致级联失败（雪崩效应）
resilience4j:
  circuitbreaker:
    configs:
      default:  # 默认熔断器配置，所有未单独配置的实例都会继承此配置
        sliding-window-size: 10  # 滑动窗口大小：统计最近10次请求的成功/失败情况
        minimum-number-of-calls: 5  # 最少调用次数：至少5次请求后才计算失败率
        failure-rate-threshold: 50  # 失败率阈值：当失败率 >= 50% 时触发熔断（打开断路器）
        wait-duration-in-open-state: 10s  # 熔断持续时间：断路器打开后等待10秒再尝试请求
        permitted-number-of-calls-in-half-open-state: 3  # 半开状态允许通过的请求数：3次
        automatic-transition-from-open-to-half-open-enabled: true  # 自动从打开状态转为半开状态
        slow-call-duration-threshold: 8s  # 慢调用阈值：响应时间超过8秒的请求视为慢调用
        slow-call-rate-threshold: 80  # 慢调用率阈值：慢调用占比 >= 80% 时触发熔断
    instances:
      product-service:  # 商品服务专用熔断器实例
        base-config: default  # 继承默认配置
        tags:
          service: bookstore-product  # 标签：用于监控和日志区分
  timelimiter:
    configs:
      default:
        timeout-duration: 10s  # 超时限制：Feign调用超过10秒自动取消（与Feign readTimeout配合）
    instances:
      product-service:
        base-config: default
  retry:  # Resilience4j 重试配置：对瞬时故障自动重试，提高调用成功率
    configs:
      default:  # 默认重试策略
        max-attempts: 3  # 最大重试次数：3次（含首次调用）
        wait-duration: 500ms  # 重试间隔：500ms，给下游短暂恢复时间
        retry-exceptions:  # 仅对以下异常类型触发重试
          - java.io.IOException  # 网络 IO 异常（连接重置、超时等）
          - java.util.concurrent.TimeoutException  # 超时异常
    instances:
      product-service:  # 商品服务专用重试实例
        base-config: default
        tags:
          service: bookstore-product
  ratelimiter:  # Resilience4j 限流器：防止对下游服务发起过多请求
    configs:
      default:
        limit-for-period: 100  # 每个周期内允许的最大请求数
        limit-refresh-period: 1s  # 周期刷新间隔：1秒
        timeout-duration: 0s  # 被限流时不等待，立即拒绝
    instances:
      product-service:
        base-config: default
        tags:
          service: bookstore-product
