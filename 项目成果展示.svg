<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <rect width="800" height="500" fill="url(#bgGrad)"/>
  
  <text x="400" y="70" text-anchor="middle" fill="white" font-family="Arial" font-size="36" font-weight="bold">AI 编码 Agent 自动化开发系统</text>
  <text x="400" y="105" text-anchor="middle" fill="#aaa" font-family="Arial" font-size="16">基于 OpenClaw &amp; Claude Code | MiMo 大模型</text>
  
  <g transform="translate(100, 140)" filter="url(#shadow)">
    <rect width="140" height="140" rx="16" fill="url(#accentGrad)"/>
    <text x="70" y="80" text-anchor="middle" fill="white" font-family="Arial" font-size="48">📦</text>
    <text x="70" y="115" text-anchor="middle" fill="white" font-family="Arial" font-size="12">任务拆解</text>
  </g>
  
  <g transform="translate(280, 140)" filter="url(#shadow)">
    <rect width="140" height="140" rx="16" fill="#10b981"/>
    <text x="70" y="80" text-anchor="middle" fill="white" font-family="Arial" font-size="48">✏️</text>
    <text x="70" y="115" text-anchor="middle" fill="white" font-family="Arial" font-size="12">代码生成</text>
  </g>
  
  <g transform="translate(460, 140)" filter="url(#shadow)">
    <rect width="140" height="140" rx="16" fill="#f59e0b"/>
    <text x="70" y="80" text-anchor="middle" fill="white" font-family="Arial" font-size="48">✅</text>
    <text x="70" y="115" text-anchor="middle" fill="white" font-family="Arial" font-size="12">单元测试</text>
  </g>
  
  <g transform="translate(640, 140)" filter="url(#shadow)">
    <rect width="140" height="140" rx="16" fill="#3b82f6"/>
    <text x="70" y="80" text-anchor="middle" fill="white" font-family="Arial" font-size="48">🔄</text>
    <text x="70" y="115" text-anchor="middle" fill="white" font-family="Arial" font-size="12">迭代优化</text>
  </g>
  
  <line x1="240" y1="210" x2="280" y2="210" stroke="#667eea" stroke-width="3" stroke-dasharray="5,5"/>
  <line x1="420" y1="210" x2="460" y2="210" stroke="#667eea" stroke-width="3" stroke-dasharray="5,5"/>
  <line x1="600" y1="210" x2="640" y2="210" stroke="#667eea" stroke-width="3" stroke-dasharray="5,5"/>
  
  <g transform="translate(100, 320)">
    <rect width="280" height="120" rx="12" fill="#1e293b"/>
    <text x="140" y="35" text-anchor="middle" fill="#667eea" font-family="Arial" font-size="14" font-weight="bold">开发效率</text>
    <text x="140" y="85" text-anchor="middle" fill="#10b981" font-family="Arial" font-size="42" font-weight="bold">+70%</text>
  </g>
  
  <g transform="translate(410, 320)">
    <rect width="290" height="120" rx="12" fill="#1e293b"/>
    <text x="145" y="35" text-anchor="middle" fill="#667eea" font-family="Arial" font-size="14" font-weight="bold">日均 Token 消耗</text>
    <text x="145" y="85" text-anchor="middle" fill="#f59e0b" font-family="Arial" font-size="42" font-weight="bold">200 万</text>
  </g>
</svg>
