filebeat.inputs:
  - type: log
    enabled: true
    paths:
      - /var/log/bookverse/*.log
    fields:
      service: bookverse-backend
      env: production
    multiline:
      pattern: '^\d{4}-\d{2}-\d{2}'
      negate: true
      match: after

output.elasticsearch:
  hosts: ["elasticsearch:9200"]
  indices:
    - index: "bookverse-%{+yyyy.MM.dd}"

setup.kibana:
  host: "kibana:5601"

logging.level: info
logging.to_files: true
