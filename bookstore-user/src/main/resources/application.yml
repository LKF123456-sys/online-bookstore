# ==================== 服务器配置 ====================
server:
  port: 8081  # 应用服务端口号，用户服务监听8081端口

# ==================== Spring 核心配置 ====================
spring:
  # 配置导入：从Nacos配置中心加载远程配置文件 bookstore-user.yml（optional表示可选，加载失败不影响启动）
  config:
    import: "optional:nacos:bookstore-user.yml"
  # 应用名称，用于在Nacos注册中心中标识该服务
  application:
    name: bookstore-user

  # ==================== 数据源配置（MySQL数据库连接） ====================
  datasource:
    # 数据库连接地址，默认连接本地MySQL的bookstore数据库，支持通过环境变量DB_URL覆盖
    url: ${DB_URL:jdbc:mysql://localhost:3306/bookstore?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    # 数据库用户名，默认为root，支持通过环境变量DB_USERNAME覆盖
    username: ${DB_USERNAME:root}
    # 数据库密码，默认为root，支持通过环境变量DB_PASSWORD覆盖
    password: ${DB_PASSWORD:root}
    # 数据库驱动类名，MySQL 8.x使用cj驱动
    driver-class-name: com.mysql.cj.jdbc.Driver
    # HikariCP 连接池配置（高性能数据库连接池）
    hikari:
      maximum-pool-size: 20  # 连接池最大连接数
      minimum-idle: 5  # 连接池最小空闲连接数
      idle-timeout: 300000  # 空闲连接最大存活时间，超过则释放（单位：毫秒，300秒=5分钟）
      max-lifetime: 1200000  # 连接的最大生命周期，超过则关闭重建（单位：毫秒，1200秒=20分钟）
      connection-timeout: 30000  # 获取连接的超时时间，超时则抛出异常（单位：毫秒，30秒）

  # ==================== Redis 缓存配置 ====================
  data:
    redis:
      # Redis服务器地址，默认为本地，支持通过环境变量REDIS_HOST覆盖
      host: ${REDIS_HOST:localhost}
      # Redis服务器端口，默认6379，支持通过环境变量REDIS_PORT覆盖
      port: ${REDIS_PORT:6379}
      # Redis密码，默认为空，支持通过环境变量REDIS_PASSWORD覆盖
      password: ${REDIS_PASSWORD:}
      # 使用第0个Redis数据库（Redis默认有16个数据库，编号0-15）
      database: 0
      # 连接超时时间
      timeout: 3000ms
      # Lettuce连接池配置（Lettuce是Redis的Java客户端）
      lettuce:
        pool:
          max-active: 8  # 连接池最大活跃连接数
          max-idle: 8  # 连接池最大空闲连接数
          min-idle: 0  # 连接池最小空闲连接数
          max-wait: -1ms  # 获取连接的最大等待时间，-1表示无限等待

  # ==================== Nacos 服务发现与配置中心 ====================
  cloud:
    nacos:
      # Nacos服务发现配置
      discovery:
        # Nacos服务器地址，支持通过环境变量NACOS_SERVER_ADDR覆盖
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        # Nacos命名空间，用于环境隔离（如dev/test/prod），支持通过环境变量覆盖
        namespace: ${NACOS_NAMESPACE:}
        # Nacos服务分组，默认为DEFAULT_GROUP
        group: ${NACOS_GROUP:DEFAULT_GROUP}
      # Nacos配置中心配置
      config:
        # Nacos配置中心服务器地址
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        # Nacos配置中心命名空间
        namespace: ${NACOS_NAMESPACE:}
        # Nacos配置中心分组
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        # 远程配置文件的扩展名（即 bookstore-user.yml 中的 yml）
        file-extension: yml
        # 导入检查配置
        import-check:
          enabled: false  # 关闭配置导入检查，避免因配置中心不可用导致启动失败

# ==================== MyBatis-Plus 配置 ====================
mybatis-plus:
  configuration:
    # 开启驼峰命名自动映射（数据库下划线命名 → Java驼峰命名，如 user_name → userName）
    map-underscore-to-camel-case: true
    # 配置MyBatis的日志实现为标准输出（开发环境方便查看SQL语句）
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      # 主键生成策略为自增（数据库自动分配ID）
      id-type: auto
  # MyBatis的Mapper XML映射文件位置
  mapper-locations: classpath:mapper/*.xml

# ==================== JWT（JSON Web Token）配置 ====================
jwt:
  # JWT签名密钥，用于生成和验证Token。至少256位，生产环境应通过环境变量设置安全的密钥
  secret: ${JWT_SECRET:BookVerseSecretKey2024ForJWTTokenGenerationMustBe256BitsLongEnough}
  # JWT Token的过期时间，单位为毫秒（86400000毫秒 = 24小时）
  expiration: ${JWT_EXPIRATION:86400000}

# ==================== Actuator 监控端点配置 ====================
management:
  endpoints:
    web:
      exposure:
        # 暴露的Web端点，包括：健康检查(health)、应用信息(info)、性能指标(metrics)、Prometheus监控数据(prometheus)
        include: health,info,metrics,prometheus
  endpoint:
    health:
      # 健康检查端点的详细信息展示策略：仅授权用户可查看详细信息
      show-details: when-authorized

# ==================== 日志配置 ====================
logging:
  level:
    # 设置com.bookstore包下的日志级别为INFO（可通过环境变量LOG_LEVEL覆盖）
    com.bookstore: ${LOG_LEVEL:INFO}
    # 设置Spring框架的日志级别为WARN，减少Spring内部日志输出
    org.springframework: WARN

# ==================== SpringDoc OpenAPI 配置 ====================
# 启用 API 文档生成功能，供 Swagger UI 加载展示
springdoc:
  api-docs:
    enabled: true  # 启用 /v3/api-docs 端点，生成 OpenAPI JSON 规范
