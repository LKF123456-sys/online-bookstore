server:
  port: 8089  # AI 智能体服务端口

spring:
  main:
    allow-bean-definition-overriding: true  # 允许覆盖自动配置的 Bean（自定义 AiModelConfig 覆盖 OpenAiChatAutoConfiguration）
  autoconfigure:
    exclude:
      - org.springframework.ai.model.openai.autoconfigure.OpenAiChatAutoConfiguration
      - org.springframework.ai.model.ollama.autoconfigure.OllamaChatAutoConfiguration
      - org.springframework.ai.model.ollama.autoconfigure.OllamaEmbeddingAutoConfiguration
  config:
    import: "optional:nacos:bookstore-agent.yml"  # Nacos 远程配置
  application:
    name: bookstore-agent  # Nacos 服务名
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/bookstore?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${DB_USERNAME:bookstore_agent}  # AI 智能体服务专属账号（V5权限隔离）
    password: ${DB_PASSWORD:BookStore@Agent2024}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10   # AI 服务数据库连接池较小（主要存聊天记录）
      minimum-idle: 3
      idle-timeout: 30000
      connection-timeout: 10000
      max-lifetime: 1800000
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      lettuce:
        pool:
          max-active: 8
          max-idle: 4
          min-idle: 2
          max-wait: -1ms
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
      config:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        file-extension: yml
        import-check:
          enabled: false
    openfeign:
      circuitbreaker:
        enabled: true
      client:
        config:
          default:
            connect-timeout: 5000
            read-timeout: 30000    # AI 调用链路较长，增大读取超时
            logger-level: BASIC

# ============================================================
# Spring AI OpenAI 自动配置（Chat + Embedding 模型）
# Embedding 模型用于 RAG 向量检索，Chat 模型由 AiModelConfig 手动管理
# ============================================================
spring.ai:
  openai:
    api-key: ${OPENAI_API_KEY:sk-placeholder}
    base-url: ${OPENAI_BASE_URL:https://api.openai.com}
    embedding:
      options:
        model: ${EMBEDDING_MODEL:text-embedding-3-small}  # 1536维，成本低，效果好

# ============================================================
# AI 模型配置 — 通过 agent.model.provider 切换底层 LLM
# ============================================================
agent:
  model:
    provider: ${AI_PROVIDER:doubao}  # openai / ollama / dashscope / deepseek / doubao
    openai:
      api-key: ${OPENAI_API_KEY:sk-placeholder}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com}
      model: ${OPENAI_MODEL:gpt-4o-mini}
      temperature: ${AI_TEMPERATURE:0.7}
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      model: ${OLLAMA_MODEL:qwen2.5:7b}
      temperature: ${AI_TEMPERATURE:0.7}
    dashscope:
      api-key: ${DASHSCOPE_API_KEY:sk-placeholder}
      model: ${DASHSCOPE_MODEL:qwen-plus}
      temperature: ${AI_TEMPERATURE:0.7}
    deepseek:
      api-key: ${DEEPSEEK_API_KEY:sk-placeholder}
      base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
      model: ${DEEPSEEK_MODEL:deepseek-chat}
      temperature: ${AI_TEMPERATURE:0.7}
    doubao:
      api-key: ${DOUBAO_API_KEY:sk-placeholder}
      base-url: ${DOUBAO_BASE_URL:https://ark.cn-beijing.volces.com/api/v3}
      model: ${DOUBAO_MODEL:doubao-pro-32k}
      temperature: ${AI_TEMPERATURE:0.7}
  memory:
    max-history: 20          # Redis 短期记忆窗口大小（消息数）
    session-ttl: 3600        # 会话空闲过期时间（秒）

# ============================================================
# RAG (检索增强生成) 配置
# ============================================================
agent.rag:
  enabled: ${RAG_ENABLED:true}
  embedding-model: ${EMBEDDING_MODEL:text-embedding-3-small}  # OpenAI Embedding 模型
  chunk-size: 800             # 文档分块大小（token数）
  chunk-overlap: 200          # 分块重叠（保持上下文连续性）
  top-k: 5                    # 语义搜索返回结果数
  knowledge-dir: classpath:knowledge/  # 知识文档目录

# ============================================================
# MCP (Model Context Protocol) 配置
# ============================================================
agent.mcp:
  enabled: ${MCP_ENABLED:true}
  server-name: bookstore-agent
  protocol-version: "2024-11-05"
  sse-endpoint: /api/agent/mcp/sse

# ==================== JWT配置 ====================
jwt:
  secret: ${JWT_SECRET:bookstore-agent-secret-key-2024-default}
  expiration: ${JWT_EXPIRATION:86400000}

# MyBatis-Plus
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
  mapper-locations: classpath:mapper/*.xml

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

# 日志
logging:
  level:
    com.bookstore: ${LOG_LEVEL:INFO}
    org.springframework.ai: DEBUG  # 开发阶段打印 AI 调用详情
    org.springframework: WARN

# SpringDoc
springdoc:
  api-docs:
    enabled: true

# ==================== Resilience4j 熔断器配置 ====================
resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        slow-call-duration-threshold: 8s
        slow-call-rate-threshold: 80
    instances:
      order-service:
        base-config: default
        tags:
          service: bookstore-order
      product-service:
        base-config: default
        tags:
          service: bookstore-product
      promotion-service:
        base-config: default
        tags:
          service: bookstore-promotion
  timelimiter:
    configs:
      default:
        timeout-duration: 30s
    instances:
      order-service:
        base-config: default
      product-service:
        base-config: default
      promotion-service:
        base-config: default
  retry:
    configs:
      default:
        max-attempts: 3
        wait-duration: 500ms
        retry-exceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
    instances:
      order-service:
        base-config: default
        tags:
          service: bookstore-order
      product-service:
        base-config: default
        tags:
          service: bookstore-product
      promotion-service:
        base-config: default
        tags:
          service: bookstore-promotion
  ratelimiter:
    configs:
      default:
        limit-for-period: 100
        limit-refresh-period: 1s
        timeout-duration: 0s
    instances:
      order-service:
        base-config: default
        tags:
          service: bookstore-order
      product-service:
        base-config: default
        tags:
          service: bookstore-product
      promotion-service:
        base-config: default
        tags:
          service: bookstore-promotion
