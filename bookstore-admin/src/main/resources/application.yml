# ======================== 服务器配置 ========================
server:
  port: 8086 # 管理后台服务的端口号，通过 http://localhost:8086 访问
  error:
    include-exception: true # 错误响应中包含异常类名（方便调试）
    include-message: always # 错误响应中包含错误消息
    include-stacktrace: always # 错误响应中包含堆栈跟踪（生产环境建议关闭）

# ======================== Spring 核心配置 ========================
spring:
  config:
    import: "optional:nacos:bookstore-admin.yml" # 从Nacos配置中心导入远程配置（optional表示配置中心不可用时不报错）
  application:
    name: bookstore-admin # 应用名称，注册到Nacos时使用此名称
  datasource: # 数据源配置（数据库连接信息）
    url: ${DB_URL:jdbc:mysql://localhost:3306/bookstore?useUnicode=true&characterEncoding=UTF-8&characterSetResults=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true} # 数据库连接URL，支持环境变量DB_URL覆盖
    username: ${DB_USERNAME:root} # 数据库用户名，默认root
    password: ${DB_PASSWORD:root} # 数据库密码，默认root
    driver-class-name: com.mysql.cj.jdbc.Driver # MySQL驱动类名
    hikari: # HikariCP连接池配置（高性能数据库连接池）
      maximum-pool-size: 20 # 最大连接数
      minimum-idle: 5 # 最小空闲连接数
      idle-timeout: 300000 # 空闲连接超时时间（5分钟，单位毫秒）
      max-lifetime: 1200000 # 连接最大生命周期（20分钟）
      connection-timeout: 30000 # 获取连接超时时间（30秒）
  data:
    redis: # Redis缓存配置
      host: ${REDIS_HOST:localhost} # Redis服务器地址
      port: ${REDIS_PORT:6379} # Redis端口
      password: ${REDIS_PASSWORD:} # Redis密码（默认为空）
      database: 0 # 使用的Redis数据库编号（0-15）
      timeout: 3000ms # 连接超时时间
      lettuce: # Lettuce客户端配置（Redis的Java客户端）
        pool: # 连接池配置
          max-active: 8 # 最大活跃连接数
          max-idle: 8 # 最大空闲连接数
          min-idle: 0 # 最小空闲连接数
          max-wait: -1ms # 获取连接最大等待时间（-1表示无限等待）
  mvc: # Spring MVC配置
    view:
      prefix: /WEB-INF/views/ # JSP视图文件的前缀路径
      suffix: .jsp # JSP视图文件的后缀（如返回"index"会解析为/WEB-INF/views/index.jsp）
    throw-exception-if-no-handler-found: true # 找不到处理器时抛出异常（而非返回404页面）
  web:
    resources:
      static-locations: classpath:/static/ # 静态资源存放路径
      add-mappings: true # 启用静态资源映射
  servlet:
    multipart: # 文件上传配置
      max-file-size: 5MB # 单个文件最大大小
      max-request-size: 10MB # 整个请求最大大小
      file-size-threshold: 2KB # 文件大小阈值（超过此值写入临时文件）
    encoding: # 字符编码配置
      charset: UTF-8 # 字符编码
      enabled: true # 启用字符编码过滤
      force: true # 强制使用UTF-8编码
  cloud:
    nacos: # Nacos服务发现和配置中心配置
      discovery: # 服务发现配置
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848} # Nacos服务器地址
        namespace: ${NACOS_NAMESPACE:} # 命名空间（用于环境隔离）
        group: ${NACOS_GROUP:DEFAULT_GROUP} # 分组
      config: # 配置中心配置
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848} # Nacos配置中心地址
        namespace: ${NACOS_NAMESPACE:} # 命名空间
        group: ${NACOS_GROUP:DEFAULT_GROUP} # 分组
        file-extension: yml # 配置文件扩展名
        import-check:
          enabled: false # 禁用导入检查（避免配置不存在时报错）

# ======================== MyBatis-Plus 配置 ========================
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true # 开启驼峰命名映射（如数据库字段user_name映射为Java属性userName）
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl # SQL日志输出到控制台（开发环境用，生产环境应关闭）
  global-config:
    db-config:
      id-type: auto # 主键生成策略为自增（数据库自动生成ID）
      logic-delete-field: deleted # 逻辑删除字段名
      logic-delete-value: 1 # 逻辑删除的值（已删除=1）
      logic-not-delete-value: 0 # 逻辑未删除的值（正常=0）
  mapper-locations: classpath:mapper/*.xml # MyBatis XML映射文件的位置

# ======================== JWT 配置 ========================
jwt:
  secret: ${JWT_SECRET:BookVerseSecretKey2024ForJWTTokenGenerationMustBe256BitsLongEnough} # JWT签名密钥（生产环境必须通过环境变量设置）
  expiration: ${JWT_EXPIRATION:86400000} # JWT过期时间（默认24小时，单位毫秒）

# ======================== Actuator 监控端点配置 ========================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus # 暴露的监控端点
  endpoint:
    health:
      show-details: when-authorized # 仅认证后显示健康详情

# ======================== 日志级别配置 ========================
logging:
  level:
    com.bookstore: ${LOG_LEVEL:DEBUG} # bookstore项目的日志级别（支持环境变量覆盖）
    org.springframework: WARN # Spring框架日志级别设为WARN（减少不必要的日志输出）

# ======================== SpringDoc OpenAPI (Swagger UI) 配置 ========================
springdoc:
  api-docs:
    enabled: true # 启用API文档端点
    path: /v3/api-docs # API文档的访问路径
  swagger-ui:
    enabled: false # 禁用Swagger UI页面（生产环境建议关闭，需要时改为true）
    path: /swagger-ui.html # Swagger UI的访问路径
  group-configs: # API分组配置
    - group: 管理后台API # 分组名称
      display-name: 管理后台全部接口 # 分组显示名称
      paths-to-match: /admin/** # 匹配的路径
    - group: 服务代理 # 分组名称
      display-name: 微服务代理转发 # 分组显示名称
      paths-to-match: /api/** # 匹配的路径
  writer-with-order-by-keys: true # JSON输出时按键名排序（方便阅读）
