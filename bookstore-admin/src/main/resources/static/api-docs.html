<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BookVerse API 文档 — 全服务接口</title>
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css">
  <link rel="stylesheet" href="/css/swagger-ui-custom.css">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    #particle-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <canvas id="particle-canvas"></canvas>
  <div id="swagger-ui"></div>

  <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js" crossorigin></script>
  <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-standalone-preset.js" crossorigin></script>

  <script>
    // ========== 赛博朋克粒子动画背景 ==========
    (function() {
      var canvas = document.getElementById('particle-canvas');
      var ctx = canvas.getContext('2d');
      var width, height;
      var particles = [];
      var particleCount = 80;
      var mouse = { x: -9999, y: -9999 };
      var isMouseOnPage = false;

      function resize() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
      }
      resize();
      window.addEventListener('resize', resize);

      document.addEventListener('mousemove', function(e) {
        mouse.x = e.clientX;
        mouse.y = e.clientY;
        isMouseOnPage = true;
      });
      document.addEventListener('mouseleave', function() {
        isMouseOnPage = false;
      });

      function Particle() { this.reset(); }
      Particle.prototype.reset = function() {
        this.x = Math.random() * width;
        this.y = Math.random() * height;
        this.vx = (Math.random() - 0.5) * 0.6;
        this.vy = (Math.random() - 0.5) * 0.6;
        this.size = Math.random() * 2 + 0.8;
        var colors = ['rgba(0,240,255,', 'rgba(153,69,255,', 'rgba(255,0,255,', 'rgba(0,255,136,'];
        this.color = colors[Math.floor(Math.random() * colors.length)];
      };
      Particle.prototype.update = function() {
        this.x += this.vx;
        this.y += this.vy;
        if (this.x < 0 || this.x > width) this.vx *= -1;
        if (this.y < 0 || this.y > height) this.vy *= -1;
        if (this.x < -50) this.x = width + 50;
        if (this.x > width + 50) this.x = -50;
        if (this.y < -50) this.y = height + 50;
        if (this.y > height + 50) this.y = -50;
      };
      Particle.prototype.draw = function() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = this.color + '0.7)';
        ctx.fill();
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size * 2.5, 0, Math.PI * 2);
        var glow = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size * 2.5);
        glow.addColorStop(0, this.color + '0.2)');
        glow.addColorStop(1, this.color + '0)');
        ctx.fillStyle = glow;
        ctx.fill();
      };

      for (var i = 0; i < particleCount; i++) {
        particles.push(new Particle());
      }

      function animate() {
        ctx.clearRect(0, 0, width, height);
        for (var i = 0; i < particles.length; i++) {
          particles[i].update();
          particles[i].draw();
        }
        for (var i = 0; i < particles.length; i++) {
          for (var j = i + 1; j < particles.length; j++) {
            var dx = particles[i].x - particles[j].x;
            var dy = particles[i].y - particles[j].y;
            var dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < 130) {
              ctx.beginPath();
              ctx.moveTo(particles[i].x, particles[i].y);
              ctx.lineTo(particles[j].x, particles[j].y);
              var alpha = (1 - dist / 130) * 0.15;
              ctx.strokeStyle = 'rgba(0,240,255,' + alpha + ')';
              ctx.lineWidth = 0.5;
              ctx.stroke();
            }
          }
        }
        if (isMouseOnPage) {
          for (var i = 0; i < particles.length; i++) {
            var dx = particles[i].x - mouse.x;
            var dy = particles[i].y - mouse.y;
            var dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < 200) {
              ctx.beginPath();
              ctx.moveTo(particles[i].x, particles[i].y);
              ctx.lineTo(mouse.x, mouse.y);
              var alpha = (1 - dist / 200) * 0.3;
              ctx.strokeStyle = 'rgba(255,0,255,' + alpha + ')';
              ctx.lineWidth = 0.6;
              ctx.stroke();
            }
          }
        }
        requestAnimationFrame(animate);
      }
      animate();
    })();

    // ========== Swagger UI 初始化 — 全微服务 API ==========
    window.onload = function() {
      window.ui = SwaggerUIBundle({
        // ===== 所有微服务的 OpenAPI 规范地址 =====
        // 每个微服务都会自动生成 /v3/api-docs 端点（JSON 格式的 OpenAPI 规范）
        // Swagger UI 会从这些地址加载 API 文档，在顶部下拉菜单中切换查看
        urls: [
          // 管理后台（有自定义分组：管理后台 API + 服务代理 API）
          {url: "http://localhost:8086/v3/api-docs/%E7%AE%A1%E7%90%86%E5%90%8E%E5%8F%B0API", name: "管理后台 API"},
          {url: "http://localhost:8086/v3/api-docs/%E6%9C%8D%E5%8A%A1%E4%BB%A3%E7%90%86",     name: "服务代理 API"},
          // 用户服务 — 认证/注册/用户管理
          {url: "http://localhost:8081/v3/api-docs", name: "用户服务 — Auth & User"},
          // 商品服务 — 商品CRUD/搜索/分类/SKU
          {url: "http://localhost:8082/v3/api-docs", name: "商品服务 — Product & Search"},
          // 订单服务 — 订单/购物车/支付/物流
          {url: "http://localhost:8083/v3/api-docs", name: "订单服务 — Order & Cart"},
          // 营销服务 — 优惠券/评价/公告
          {url: "http://localhost:8085/v3/api-docs", name: "营销服务 — Coupon & Review"},
          // 消息服务 — 站内信/通知
          {url: "http://localhost:8087/v3/api-docs", name: "消息服务 — Message & Notification"}
        ],

        // 默认展开显示"管理后台 API"分组
        "urls.primaryName": "管理后台 API",

        // DOM 容器
        dom_id: '#swagger-ui',

        // 深度链接：URL 锚点记录当前展开的接口，方便分享
        deepLinking: true,

        // 显示请求耗时
        displayRequestDuration: true,

        // Models 展开层级
        defaultModelsExpandDepth: 1,
        defaultModelExpandDepth: 1,

        // 接口默认折叠为列表模式
        docExpansion: "list",

        // 启用接口搜索过滤
        filter: true,

        // 显示扩展字段
        showExtensions: true,
        showCommonExtensions: true,

        // 代码高亮主题：Monokai 暗色
        syntaxHighlight: { theme: "monokai" },

        // 启用 "Try It Out" 在线测试
        tryItOutEnabled: true,

        // 预设：API 文档解析 + 独立布局
        presets: [
          SwaggerUIBundle.presets.apis,
          SwaggerUIStandalonePreset
        ],

        // 插件：支持从 URL 下载规范
        plugins: [
          SwaggerUIBundle.plugins.DownloadUrl
        ],

        // 布局模式：独立页面（含顶部栏）
        layout: "StandaloneLayout",

        // ===== 请求拦截器：为 Try It Out 自动添加认证 Header =====
        requestInterceptor: function(req) {
          // 如果浏览器中存在 admin session，可以考虑自动携带
          // 这里暂时不做自动处理，用户可手动在 Authorize 中设置
          return req;
        }
      });
    };
  </script>
</body>
</html>
