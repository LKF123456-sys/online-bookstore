version: '3.8'

services:
  # ============================================================
  # 基础设施层
  # ============================================================

  # MySQL 8.0 数据库
  mysql:
    image: mysql:8.0
    container_name: bookstore-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: bookstore
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "${DB_USERNAME}", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - bookstore-net
    restart: unless-stopped

  # Redis 7 缓存（含 RediSearch 模块，用于 RAG 向量检索）
  redis:
    image: redis/redis-stack-server:7.2.0-v10
    container_name: bookstore-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bookstore-net
    restart: unless-stopped

  # Nacos 2.3 注册中心 / 配置中心
  nacos:
    image: nacos/nacos-server:v2.3.0
    container_name: bookstore-nacos
    environment:
      MODE: standalone
      SPRING_DATASOURCE_PLATFORM: mysql
      MYSQL_SERVICE_HOST: mysql
      MYSQL_SERVICE_PORT: 3306
      MYSQL_SERVICE_DB_NAME: nacos_config
      MYSQL_SERVICE_USER: ${DB_USERNAME}
      MYSQL_SERVICE_PASSWORD: ${DB_PASSWORD}
      MYSQL_SERVICE_DB_PARAM: "characterEncoding=utf8&connectTimeout=1000&socketTimeout=3000&autoReconnect=true&useUnicode=true&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true"
      JVM_XMS: 256m
      JVM_XMX: 512m
    ports:
      - "8848:8848"   # Nacos 主端口
      - "9848:9848"   # gRPC 客户端通信端口
      - "9849:9849"   # gRPC 服务端通信端口
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/v1/console/health/readiness"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - bookstore-net
    restart: unless-stopped

  # SkyWalking OAP Server（链路追踪后端）
  skywalking-oap:
    image: apache/skywalking-oap-server:9.7.0
    container_name: bookstore-skywalking-oap
    environment:
      SW_STORAGE: h2
      SW_STORAGE_H2_URL: jdbc:h2:mem:skywalking-oap-db
      SW_HEALTH_CHECKER: default
      SW_TELEMETRY: prometheus
      SW_CORE_REST_PORT: 12800
      SW_CORE_GRPC_PORT: 11800
      JAVA_OPTS: "-Xms256m -Xmx512m"
    ports:
      - "12800:12800"   # REST API（UI 查询接口）
      - "11800:11800"   # gRPC（Agent 数据上报端口）
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -sf http://localhost:12800/healthcheck || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - bookstore-net
    restart: unless-stopped

  # SkyWalking UI（链路追踪可视化界面）
  skywalking-ui:
    image: apache/skywalking-ui:9.7.0
    container_name: bookstore-skywalking-ui
    environment:
      SW_OAP_ADDRESS: http://skywalking-oap:12800
    ports:
      - "8888:8080"    # Web UI 访问端口
    depends_on:
      skywalking-oap:
        condition: service_healthy
    networks:
      - bookstore-net
    restart: unless-stopped

  # ============================================================
  # 微服务层（Java / Spring Boot）
  # ============================================================

  # API 网关服务 (端口 8080)
  gateway:
    build:
      context: .
      dockerfile: docker/Dockerfile.service
      args:
        MODULE: bookstore-gateway
    container_name: bookstore-gateway
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: 8080
      DB_URL: jdbc:mysql://mysql:3306/bookstore?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      NACOS_SERVER_ADDR: nacos:8848
      SPRING_PROFILES_ACTIVE: prod
      JAVA_OPTS: "-javaagent:/skywalking/agent/skywalking-agent.jar -Xms256m -Xmx512m -XX:+UseG1GC"
      SW_AGENT_NAME: bookstore-gateway
      JWT_SECRET: ${JWT_SECRET}
      SW_AGENT_COLLECTOR_BACKEND_SERVICES: skywalking-oap:11800
      SW_AGENT_LOG_REPORT_ACTIVE: "true"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      nacos:
        condition: service_healthy
      skywalking-oap:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 45s
    networks:
      - bookstore-net
    restart: unless-stopped

  # 用户服务 (端口 8081)
  user:
    build:
      context: .
      dockerfile: docker/Dockerfile.service
      args:
        MODULE: bookstore-user
    container_name: bookstore-user
