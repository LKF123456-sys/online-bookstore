  # ============================================================
  # 前端层（Nginx 托管 Vue SPA）
  # ============================================================

  # 用户端前端 (端口 80)
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: bookstore-frontend
