    container_name: bookstore-agent
    ports:
      - "8089:8089"
    environment:
      SERVER_PORT: 8089
      DB_URL: jdbc:mysql://mysql:3306/bookstore?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      NACOS_SERVER_ADDR: nacos:8848
      SPRING_PROFILES_ACTIVE: prod
      AI_PROVIDER: ${AI_PROVIDER:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL}
      JAVA_OPTS: "-javaagent:/skywalking/agent/skywalking-agent.jar -Xms256m -Xmx512m -XX:+UseG1GC"
      SW_AGENT_NAME: bookstore-agent
