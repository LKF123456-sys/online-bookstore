      start_period: 45s
    networks:
      - bookstore-net
    restart: unless-stopped

  # 管理后台服务 (端口 8086)
  admin:
    build:
      context: .
      dockerfile: docker/Dockerfile.service
      args:
        MODULE: bookstore-admin
    container_name: bookstore-admin
    ports:
