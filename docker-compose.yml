      context: .
      dockerfile: docker/Dockerfile.admin-frontend
    container_name: bookstore-admin-frontend
    ports:
      - "81:81"
    depends_on:
      - gateway
    networks:
      - bookstore-net
    restart: unless-stopped

# ============================================================
# 持久化卷
# ============================================================
volumes:
  mysql_data:
  redis_data:

# ============================================================
# 网络
# ============================================================
networks:
  bookstore-net:
    driver: bridge
