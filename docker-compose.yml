version: '3.8'

services:
  # ============================================================
  # 基础设施层
  # ============================================================

  # MySQL 8.0 数据库
  mysql:
    image: mysql:8.0
    container_name: bookstore-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: bookstore
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - bookstore-net
    restart: unless-stopped

  # Redis 7 缓存
  redis:
    image: redis:7-alpine
    container_name: bookstore-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bookstore-net
    restart: unless-stopped

  # Nacos 2.3 注册中心 / 配置中心
  nacos:
    image: nacos/nacos-server:v2.3.0
    container_name: bookstore-nacos
    environment:
      MODE: standalone
      SPRING_DATASOURCE_PLATFORM: mysql
      MYSQL_SERVICE_HOST: mysql
      MYSQL_SERVICE_PORT: 3306
      MYSQL_SERVICE_DB_NAME: nacos_config
      MYSQL_SERVICE_USER: root
      MYSQL_SERVICE_PASSWORD: root
      MYSQL_SERVICE_DB_PARAM: "characterEncoding=utf8&connectTimeout=1000&socketTimeout=3000&autoReconnect=true&useUnicode=true&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true"
      JVM_XMS: 256m
      JVM_XMX: 512m
    ports:
      - "8848:8848"   # Nacos 主端口
      - "9848:9848"   # gRPC 客户端通信端口
      - "9849:9849"   # gRPC 服务端通信端口
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/v1/console/health/readiness"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - bookstore-net
    restart: unless-stopped

  # ============================================================
  # 微服务层（Java / Spring Boot）
  # ============================================================

  # API 网关服务 (端口 8080)
  gateway:
    build:
      context: .
      dockerfile: docker/Dockerfile.service
      args:
        MODULE: bookstore-gateway
    container_name: bookstore-gateway
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: 8080
      DB_URL: jdbc:mysql://mysql:3306/bookstore?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      DB_USERNAME: root
      DB_PASSWORD: root
      REDIS_HOST: redis
      REDIS_PORT: 6379
      NACOS_SERVER_ADDR: nacos:8848
      SPRING_PROFILES_ACTIVE: prod
      JAVA_OPTS: "-Xms256m -Xmx512m -XX:+UseG1GC"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      nacos:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 45s
    networks:
      - bookstore-net
    restart: unless-stopped

  # 用户服务 (端口 8081)
  user:
    build:
      context: .
      dockerfile: docker/Dockerfile.service
      args:
        MODULE: bookstore-user
    container_name: bookstore-user
    ports:
      - "8081:8081"
    environment:
      SERVER_PORT: 8081
      DB_URL: jdbc:mysql://mysql:3306/bookstore?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      DB_USERNAME: root
      DB_PASSWORD: root
      REDIS_HOST: redis
      REDIS_PORT: 6379
      NACOS_SERVER_ADDR: nacos:8848
      SPRING_PROFILES_ACTIVE: prod
      JAVA_OPTS: "-Xms256m -Xmx512m -XX:+UseG1GC"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      nacos:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 45s
    networks:
      - bookstore-net
    restart: unless-stopped

  # 商品服务 (端口 8082)
  product:
    build:
      context: .
      dockerfile: docker/Dockerfile.service
      args:
        MODULE: bookstore-product
    container_name: bookstore-product
    ports:
      - "8082:8082"
    environment:
      SERVER_PORT: 8082
      DB_URL: jdbc:mysql://mysql:3306/bookstore?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      DB_USERNAME: root
      DB_PASSWORD: root
      REDIS_HOST: redis
      REDIS_PORT: 6379
      NACOS_SERVER_ADDR: nacos:8848
      SPRING_PROFILES_ACTIVE: prod
      JAVA_OPTS: "-Xms256m -Xmx512m -XX:+UseG1GC"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      nacos:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8082/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 45s
    networks:
      - bookstore-net
    restart: unless-stopped

  # 订单服务 (端口 8083)
  order:
    build:
      context: .
      dockerfile: docker/Dockerfile.service
      args:
        MODULE: bookstore-order
    container_name: bookstore-order
    ports:
      - "8083:8083"
    environment:
      SERVER_PORT: 8083
      DB_URL: jdbc:mysql://mysql:3306/bookstore?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      DB_USERNAME: root
      DB_PASSWORD: root
      REDIS_HOST: redis
      REDIS_PORT: 6379
      NACOS_SERVER_ADDR: nacos:8848
      SPRING_PROFILES_ACTIVE: prod
      JAVA_OPTS: "-Xms256m -Xmx512m -XX:+UseG1GC"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      nacos:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8083/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 45s
    networks:
      - bookstore-net
    restart: unless-stopped

  # 营销服务 (端口 8085)
  promotion:
    build:
      context: .
      dockerfile: docker/Dockerfile.service
      args:
        MODULE: bookstore-promotion
    container_name: bookstore-promotion
